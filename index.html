<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REIVENSTUDIO | Patrocinadores</title>
    <style>
        /* Estilos Gerais da Página (Inspirado no tema VIP da ReivenStudio) */
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Botão de Voltar */
        .btn-voltar {
            display: inline-block;
            color: #66fcf1;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 40px;
            transition: opacity 0.3s ease;
        }
        .btn-voltar:hover {
            opacity: 0.8;
        }

        /* Título Principal */
        .titulo-principal {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #66fcf1;
            margin-bottom: 10px;
        }

        .subtitulo {
            font-size: 14px;
            color: #c5c6c7;
            margin-bottom: 50px;
        }

        /* --- SECÇÃO DE PATROCINADORES PEDIDA --- */
        .seccao-patrocinadores {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .texto-patrocinio {
            font-size: 20px;
            font-weight: 600;
            color: #c5c6c7;
            margin-bottom: 25px;
        }

        .bloco-patrocinador {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contentor da Imagem do Logótipo */
        .logo-container {
            width: 100%;
            max-width: 320px;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.7));
        }

        /* Alinhamento do Nome e do Link Lado a Lado */
        .Info-patrocinador {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 22px;
        }

        .nome-marca {
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .link-saiba-mais {
            color: #66fcf1;
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        /* Efeito ao passar o rato no Saiba Mais */
        .link-saiba-mais:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #66fcf1;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Botão para voltar à página principal da REIVENSTUDIO -->
        <a href="../" class="btn-voltar">← Voltar PATROCINADORES</a>

        <h1 class="titulo-principal">Nossos Parceiros</h1>
        <p class="subtitulo">Marcas e negócios VIP que confiam no nosso trabalho</p>

        <!-- SECÇÃO COMPLETA DA BORN2OWN -->
        <div class="seccao-patrocinadores">
            
            <div class="texto-patrocinio">patrocinado por:</div>
            
            <div class="bloco-patrocinador">
                <!-- Imagem da Logo fornecida -->
                <div class="logo-container">
                    <img src="https://squarespace-cdn.com" alt="Born2Own Logo" class="logo-img">
                </div>
                
                <!-- Nome e Link Alinhados Lado a Lado -->
                <div class="Info-patrocinador">
                    <span class="nome-marca">Born2Own</span>
                    <a href="https://github.io" target="_blank" class="link-saiba-mais">saiba mais...</a>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
